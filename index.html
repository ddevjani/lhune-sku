<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LHUNE SKU</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1C1C1C;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px;text-align:center}
.brand{font-size:11px;letter-spacing:.3em;color:#C9A96E;margin-bottom:28px}
.label{font-size:12px;color:#666;margin-bottom:10px;letter-spacing:.1em;text-transform:uppercase}
.sku{font-family:'Courier New',monospace;font-size:17px;background:#242424;color:#C9A96E;border:1px solid #C9A96E44;padding:16px 22px;border-radius:8px;word-break:break-all;cursor:pointer;width:100%;max-width:440px;transition:background .15s;-webkit-user-select:all;user-select:all}
.sku:active{background:#2e2e2e}
.msg{margin-top:16px;font-size:14px;min-height:20px}
.hint{margin-top:10px;font-size:11px;color:#444}
.rule{width:40px;height:1px;background:#C9A96E44;margin:28px auto}
</style>
</head>
<body>
<div class="brand">LHUNE</div>
<p class="label">Product SKU</p>
<div class="sku" id="sku">—</div>
<p class="msg" id="msg"></p>
<p class="hint">Tap to copy again</p>
<div class="rule"></div>
<div class="brand">LHUNE.COM</div>
<script>
var sku = new URLSearchParams(location.search).get('s') || '';
var el  = document.getElementById('sku');
var msg = document.getElementById('msg');
el.textContent = sku || 'No SKU specified';
document.title  = sku ? 'SKU: ' + sku : 'LHUNE SKU';

function showMsg(text, color) {
  msg.textContent = text;
  msg.style.color = color || '#C9A96E';
}

function copyViaExec() {
  // Works without user gesture on most mobile browsers
  var ta = document.createElement('textarea');
  ta.value = sku;
  ta.setAttribute('readonly', '');
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  var ok = false;
  try { ok = document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
  return ok;
}

function copy() {
  if (!sku) return;
  // Try execCommand first (works on page load, no gesture needed)
  if (copyViaExec()) {
    showMsg('✓ Copied to clipboard', '#4CAF50');
    return;
  }
  // Fall back to modern API (requires gesture, may prompt)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(sku)
      .then(function() { showMsg('✓ Copied to clipboard', '#4CAF50'); })
      .catch(function() { showMsg('Tap the SKU to copy', '#C9A96E'); });
  } else {
    showMsg('Tap the SKU to copy', '#C9A96E');
  }
}

el.addEventListener('click', copy);

// Auto-copy immediately on load
if (sku) { copy(); }
</script>
</body>
</html>
